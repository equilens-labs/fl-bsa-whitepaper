name: pull-wp-intake

on:
  # Cross-repo automation strategies:
  # 1) repository_dispatch from fl-bsa (preferred) — see docs/ci_intake.md
  # 2) scheduled pull (daily)
  # 3) manual dispatch with inputs
  repository_dispatch:
    types: [wp-intake-ready]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      persist_intake_pr:
        description: "open/update a PR containing the synced intake snapshot"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  actions: read
  pull-requests: write

jobs:
  fetch-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps (for macro/plot generation)
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyyaml matplotlib

      - name: Download intake bundle from producer
        env:
          PRODUCER_REPO: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.producer_repo || 'equilens-labs/fl-bsa' }}
          PRODUCER_WORKFLOW: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.workflow_file || 'wp-evidence-nightly.yml' }}
          PRODUCER_ARTIFACT: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.artifact_name || 'wp-intake-bundle-v4' }}
          PRODUCER_BRANCH: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch || 'main' }}
          PRODUCER_RUN_ID: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.producer_run_id || '' }}
          PRODUCER_TOKEN: ${{ secrets.PRODUCER_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p wp-bundle

          token="${PRODUCER_TOKEN:-}"
          if [ -z "$token" ] && [ "$PRODUCER_REPO" != "$GITHUB_REPOSITORY" ]; then
            echo "PRODUCER_TOKEN is required to read artifacts from ${PRODUCER_REPO}." >&2
            echo "Configure a token with Actions read access to ${PRODUCER_REPO}, or dispatch with artifacts from this repository." >&2
            exit 1
          fi
          if [ -n "$token" ]; then
            export GH_TOKEN="$token"
          fi

          run_id="$PRODUCER_RUN_ID"
          if [ -z "$run_id" ]; then
            run_id="$(gh run list \
              -R "$PRODUCER_REPO" \
              --workflow "$PRODUCER_WORKFLOW" \
              --branch "$PRODUCER_BRANCH" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')"
          fi
          if [ -z "$run_id" ]; then
            echo "No successful ${PRODUCER_REPO}/${PRODUCER_WORKFLOW}@${PRODUCER_BRANCH} run found." >&2
            exit 1
          fi

          artifact_candidates=("$PRODUCER_ARTIFACT")
          if [ "$PRODUCER_ARTIFACT" = "wp-intake-bundle-v4" ]; then
            artifact_candidates+=("wp-reviewer-pack-v4")
          fi

          selected_artifact=""
          for artifact in "${artifact_candidates[@]}"; do
            echo "Downloading ${artifact} from ${PRODUCER_REPO} run ${run_id}"
            if gh run download "$run_id" \
              -R "$PRODUCER_REPO" \
              -n "$artifact" \
              -D wp-bundle; then
              selected_artifact="$artifact"
              break
            fi
            echo "Artifact ${artifact} not available in run ${run_id}; trying next candidate." >&2
          done

          if [ -z "$selected_artifact" ]; then
            echo "None of the candidate intake artifacts were downloadable: ${artifact_candidates[*]}" >&2
            exit 1
          fi
          echo "SELECTED_PRODUCER_ARTIFACT=${selected_artifact}" >> "$GITHUB_ENV"
          echo "SELECTED_PRODUCER_RUN_ID=${run_id}" >> "$GITHUB_ENV"

      - name: Unpack intake bundle
        run: |
          set -euo pipefail
          bundle_path="$(find wp-bundle -maxdepth 5 \( -name 'WhitePaper_Intake_Bundle_v4.zip' -o -name 'WhitePaper_Reviewer_Pack_v4.zip' \) -print -quit || true)"
          if [ -z "$bundle_path" ]; then
            echo "Bundle zip not found under wp-bundle/" >&2
            find wp-bundle -maxdepth 5 -type f -print >&2 || true
            exit 1
          fi
          rm -rf bundle && mkdir -p bundle
          unzip -q "$bundle_path" -d bundle
          test -f bundle/intake/metrics_uncertainty.json
          test -f bundle/provenance/manifest.json
          test -f bundle/certificates/synthetic_quality_certificate.json

      - name: Validate bundle schema versions
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = Path("bundle/provenance/manifest.json")
          m = json.loads(manifest.read_text(encoding="utf-8"))
          schema = str(m.get("schema_version") or "")
          if schema != "wp-intake.v1":
              raise SystemExit(
                  f"Unexpected bundle provenance schema_version={schema!r}; expected 'wp-intake.v1'"
              )

          mu_path = Path("bundle/intake/metrics_uncertainty.json")
          mu = json.loads(mu_path.read_text(encoding="utf-8"))
          mu_schema = str(mu.get("schema_version") or "")
          if mu_schema != "fairness_uncertainty.v1":
              raise SystemExit(
                  "Unexpected bundle metrics_uncertainty.schema_version="
                  f"{mu_schema!r}; expected 'fairness_uncertainty.v1'"
              )

          print("Bundle schema versions OK")
          PY

      - name: Sync bundle contents into repo (intake/ + config/)
        env:
          PRODUCER_REPO: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.producer_repo || 'equilens-labs/fl-bsa' }}
          PRODUCER_WORKFLOW: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.workflow_file || 'wp-evidence-nightly.yml' }}
          PRODUCER_ARTIFACT: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.artifact_name || 'wp-intake-bundle-v4' }}
          PRODUCER_BRANCH: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch || 'main' }}
          PRODUCER_RUN_ID: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.producer_run_id || '' }}
        run: |
          set -euo pipefail
          mkdir -p intake
          cp bundle/intake/*.csv intake/ || true
          cp bundle/intake/*.json intake/ || true
          cp bundle/provenance/manifest.json intake/manifest.json
          python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          manifest_path = Path("intake/manifest.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          manifest["whitepaper_consumer"] = {
              "repo": os.environ["GITHUB_REPOSITORY"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflow": os.environ["GITHUB_WORKFLOW"],
              "event_name": os.environ["GITHUB_EVENT_NAME"],
              "ingested_at": datetime.now(tz=UTC).isoformat(),
              "producer": {
                  "repo": os.environ.get("PRODUCER_REPO", ""),
                  "workflow": os.environ.get("PRODUCER_WORKFLOW", ""),
                  "artifact": os.environ.get("SELECTED_PRODUCER_ARTIFACT") or os.environ.get("PRODUCER_ARTIFACT", ""),
                  "branch": os.environ.get("PRODUCER_BRANCH", ""),
                  "run_id": os.environ.get("SELECTED_PRODUCER_RUN_ID") or os.environ.get("PRODUCER_RUN_ID", ""),
              },
          }
          manifest_path.write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          mkdir -p intake/certificates
          cp bundle/certificates/*.json intake/certificates/
          mkdir -p config
          cp bundle/config/sap.yaml config/sap.yaml
          if [ -f bundle/config/fairness_config.yaml ]; then
            cp bundle/config/fairness_config.yaml config/fairness_config.yaml
          fi

      - name: Generate TeX macros from metrics (tolerant)
        run: |
          make macros

      - name: Generate figures from intake (tolerant)
        run: |
          make plots

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: false

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: whitepaper-pdf-from-intake
          path: main.pdf

      - name: Upload intake bundle used
        uses: actions/upload-artifact@v4
        with:
          name: intake-bundle-used
          path: |
            wp-bundle/**/WhitePaper_Intake_Bundle_v4.zip
            wp-bundle/**/WhitePaper_Reviewer_Pack_v4.zip

      - name: Package arXiv source
        run: |
          bash scripts/arxiv_pack.sh

      - name: Upload arXiv source
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-source-from-intake
          path: dist/whitepaper_arxiv_source.zip

      - name: Open intake snapshot PR
        env:
          GH_TOKEN: ${{ github.token }}
          PERSIST_INTAKE_PR: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.persist_intake_pr) || github.event_name == 'repository_dispatch' && format('{0}', github.event.client_payload.persist_intake_pr) || 'true' }}
          PRODUCER_REPO: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.producer_repo || 'equilens-labs/fl-bsa' }}
          PRODUCER_WORKFLOW: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.workflow_file || 'wp-evidence-nightly.yml' }}
          PRODUCER_BRANCH: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch || 'main' }}
        run: |
          set -euo pipefail

          persist="$(printf '%s' "$PERSIST_INTAKE_PR" | tr '[:upper:]' '[:lower:]')"
          if [ "$persist" = "false" ] || [ "$persist" = "0" ] || [ "$persist" = "no" ]; then
            echo "Skipping intake PR persistence because persist_intake_pr=${PERSIST_INTAKE_PR}."
            exit 0
          fi

          if [ -z "$(git status --short -- intake config includes figures)" ]; then
            echo "No intake, config, macro, or figure changes to persist."
            exit 0
          fi

          producer_sha="$(python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("intake/manifest.json").read_text(encoding="utf-8"))
          print(
              manifest.get("commit_sha")
              or manifest.get("code_commit")
              or manifest.get("source_commit")
              or manifest.get("software_commit")
              or "unknown"
          )
          PY
          )"
          short_sha="$(printf '%s' "$producer_sha" | tr -cd '[:alnum:]' | cut -c1-12)"
          if [ -z "$short_sha" ]; then
            short_sha="unknown"
          fi

          branch="chore/wp-intake-${short_sha}-${SELECTED_PRODUCER_RUN_ID:-${GITHUB_RUN_ID}}"
          title="chore(intake): sync FL-BSA evidence ${short_sha}"
          body_file="$(mktemp)"
          cat > "$body_file" <<EOF
          ## Summary
          - sync intake/config artifacts from ${PRODUCER_REPO} ${PRODUCER_WORKFLOW}
          - regenerate committed TeX macros and figures from the synced intake
          - preserve the exact whitepaper source snapshot used by pull-wp-intake run ${GITHUB_RUN_ID}

          ## Provenance
          - producer repo: ${PRODUCER_REPO}
          - producer workflow: ${PRODUCER_WORKFLOW}
          - producer branch: ${PRODUCER_BRANCH}
          - producer run id: ${SELECTED_PRODUCER_RUN_ID:-${PRODUCER_RUN_ID:-not_available}}
          - producer artifact: ${SELECTED_PRODUCER_ARTIFACT:-not_available}
          - producer commit: ${producer_sha}

          ## Validation
          - bundle schema versions checked by pull-wp-intake
          - make macros
          - make plots
          - LaTeX compile via xu-cheng/latex-action
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$branch"
          git add intake config includes figures
          git commit -m "$title"
          git push --force-with-lease origin "$branch"

          if gh pr view "$branch" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$branch" --repo "$GITHUB_REPOSITORY" --title "$title" --body-file "$body_file"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "${GITHUB_REF_NAME:-main}" \
              --head "$branch" \
              --title "$title" \
              --body-file "$body_file"
          fi
