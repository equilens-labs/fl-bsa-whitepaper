
name: latex-build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyyaml
      - name: Run workflow contract tests
        run: |
          make test
      - name: Generate TeX macros (tolerate missing intake/)
        run: |
          make macros
      - name: Enable public demo watermark
        run: |
          mkdir -p includes
          printf '\\drafttrue\n' > includes/publication_profile.local.tex
      - name: Ensure pdftotext available
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: false
      - name: Assert public demo watermark in PDF
        run: |
          set -euo pipefail
          hits="$(pdftotext main.pdf - | grep -F -c 'DEMO / EVALUATION ONLY' || true)"
          if [ "$hits" -lt 1 ]; then
            echo "whitepaper.pdf is missing DEMO / EVALUATION ONLY text marker." >&2
            exit 1
          fi
          echo "Found DEMO / EVALUATION ONLY marker ${hits} time(s)."
      - name: Prepare artifacts directory
        run: |
          mkdir -p dist
          cp main.pdf dist/whitepaper.pdf
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: whitepaper-pdf
          path: main.pdf
      - name: Package arXiv source
        run: |
          bash scripts/arxiv_pack.sh
      - name: Upload arXiv source
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-source
          path: dist/whitepaper_arxiv_source.zip
      - name: Attach artifacts to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/whitepaper.pdf
            dist/whitepaper_arxiv_source.zip
